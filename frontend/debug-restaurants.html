<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Restaurants</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Debug Restaurants API</h1>
        
        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="text-lg font-semibold mb-4">Authentication Status</h2>
            <div id="authStatus" class="mb-4"></div>
            <button id="loginBtn" class="bg-blue-500 text-white px-4 py-2 rounded mr-2">Login</button>
            <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded">Logout</button>
        </div>
        
        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="text-lg font-semibold mb-4">Test Restaurants API</h2>
            <button id="testRestaurants" class="bg-green-500 text-white px-4 py-2 rounded mb-4">Test Restaurants API</button>
            <div id="apiResult" class="bg-gray-100 p-4 rounded"></div>
        </div>
        
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-lg font-semibold mb-4">Local Storage Debug</h2>
            <div id="storageDebug" class="bg-gray-100 p-4 rounded"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function updateAuthStatus() {
            const authStatusDiv = document.getElementById('authStatus');
            const isAuth = authManager.isAuthenticated();
            const user = authManager.getCurrentUser();
            const token = localStorage.getItem(STORAGE_KEYS.ACCESS_TOKEN);
            
            authStatusDiv.innerHTML = `
                <p><strong>Authenticated:</strong> ${isAuth}</p>
                <p><strong>User:</strong> ${user ? user.email : 'None'}</p>
                <p><strong>Token:</strong> ${token ? token.substring(0, 50) + '...' : 'None'}</p>
            `;
        }
        
        function updateStorageDebug() {
            const storageDiv = document.getElementById('storageDebug');
            const storage = {
                access_token: localStorage.getItem(STORAGE_KEYS.ACCESS_TOKEN),
                refresh_token: localStorage.getItem(STORAGE_KEYS.REFRESH_TOKEN),
                user_data: localStorage.getItem(STORAGE_KEYS.USER_DATA)
            };
            
            storageDiv.innerHTML = `<pre>${JSON.stringify(storage, null, 2)}</pre>`;
        }
        
        document.getElementById('loginBtn').addEventListener('click', async () => {
            try {
                await authManager.login('john.demo@fooddelivery.com', 'password123');
                updateAuthStatus();
                updateStorageDebug();
            } catch (error) {
                console.error('Login failed:', error);
                document.getElementById('apiResult').innerHTML = `<p class="text-red-500">Login failed: ${error.message}</p>`;
            }
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            authManager.logout();
            updateAuthStatus();
            updateStorageDebug();
        });
        
        document.getElementById('testRestaurants').addEventListener('click', async () => {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.innerHTML = '<p>Testing...</p>';
            
            try {
                const response = await authManager.apiRequest('/restaurants');
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <p><strong>Status:</strong> ${response.status}</p>
                    <p><strong>Response:</strong></p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                console.error('API test failed:', error);
                resultDiv.innerHTML = `<p class="text-red-500">API test failed: ${error.message}</p>`;
            }
        });
        
        // Initialize
        updateAuthStatus();
        updateStorageDebug();
    </script>
</body>
</html>
