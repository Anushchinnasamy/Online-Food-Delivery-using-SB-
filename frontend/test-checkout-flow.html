<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Checkout Flow - Food Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Test Checkout Flow</h1>
        
        <!-- Test Steps -->
        <div class="space-y-6">
            <!-- Step 1: Login -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4">Step 1: Login</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" id="loginEmail" value="john.demo@fooddelivery.com" 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input type="password" id="loginPassword" value="password123" 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md">
                    </div>
                </div>
                <button id="loginBtn" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                    Login
                </button>
                <div id="loginStatus" class="mt-2 text-sm"></div>
            </div>

            <!-- Step 2: Add Items to Cart -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4">Step 2: Add Items to Cart</h2>
                <button id="addItemBtn" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
                    Add Sample Item to Cart
                </button>
                <div id="cartStatus" class="mt-2 text-sm"></div>
            </div>

            <!-- Step 3: Test Checkout -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4">Step 3: Test Checkout</h2>
                <button id="checkoutBtn" class="bg-orange-600 text-white px-4 py-2 rounded hover:bg-orange-700">
                    Go to Checkout
                </button>
                <div id="checkoutStatus" class="mt-2 text-sm"></div>
            </div>

            <!-- Step 4: Place Order -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4">Step 4: Place Order (API Test)</h2>
                <button id="placeOrderBtn" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                    Test Order API
                </button>
                <div id="orderStatus" class="mt-2 text-sm"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    
    <script>
        // Test login
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const statusDiv = document.getElementById('loginStatus');
            
            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem(STORAGE_KEYS.ACCESS_TOKEN, data.access_token);
                    localStorage.setItem(STORAGE_KEYS.USER_DATA, JSON.stringify(data.user));
                    statusDiv.innerHTML = '<span class="text-green-600">✓ Login successful</span>';
                } else {
                    statusDiv.innerHTML = '<span class="text-red-600">✗ Login failed</span>';
                }
            } catch (error) {
                statusDiv.innerHTML = `<span class="text-red-600">✗ Error: ${error.message}</span>`;
            }
        });

        // Test add item to cart
        document.getElementById('addItemBtn').addEventListener('click', () => {
            const statusDiv = document.getElementById('cartStatus');
            
            // Sample menu item
            const sampleItem = {
                id: 1,
                name: "Margherita Pizza",
                description: "Classic pizza with tomato sauce and mozzarella",
                price: 299,
                imageUrl: "https://images.unsplash.com/photo-1565299624946-b28f40a0ca4b?w=300&h=200&fit=crop",
                isVegetarian: true,
                restaurantId: 1,
                restaurantName: "Spice Palace",
                deliveryFee: 30
            };
            
            if (cartManager.addItem(sampleItem)) {
                statusDiv.innerHTML = '<span class="text-green-600">✓ Item added to cart</span>';
            } else {
                statusDiv.innerHTML = '<span class="text-red-600">✗ Failed to add item (login required)</span>';
            }
        });

        // Test checkout navigation
        document.getElementById('checkoutBtn').addEventListener('click', () => {
            const statusDiv = document.getElementById('checkoutStatus');
            
            if (cartManager.isEmpty()) {
                statusDiv.innerHTML = '<span class="text-red-600">✗ Cart is empty</span>';
                return;
            }
            
            // Open checkout page in new tab
            window.open('pages/checkout.html', '_blank');
            statusDiv.innerHTML = '<span class="text-green-600">✓ Checkout page opened</span>';
        });

        // Test order API directly
        document.getElementById('placeOrderBtn').addEventListener('click', async () => {
            const statusDiv = document.getElementById('orderStatus');
            const token = localStorage.getItem(STORAGE_KEYS.ACCESS_TOKEN);
            
            if (!token) {
                statusDiv.innerHTML = '<span class="text-red-600">✗ Please login first</span>';
                return;
            }
            
            const orderData = {
                restaurantId: 1,
                items: [
                    {
                        menuItemId: 1,
                        quantity: 1,
                        specialInstructions: "Test order from checkout flow"
                    }
                ],
                specialInstructions: "Test order - Address: 123 Test Street, Phone: 9876543210"
            };
            
            try {
                const response = await fetch(`${API_CONFIG.BASE_URL}/orders`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(orderData)
                });
                
                if (response.ok) {
                    const orderResponse = await response.json();
                    statusDiv.innerHTML = `<span class="text-green-600">✓ Order placed successfully! Order #${orderResponse.orderNumber || orderResponse.id}</span>`;
                } else {
                    const errorData = await response.json().catch(() => ({}));
                    statusDiv.innerHTML = `<span class="text-red-600">✗ Order failed: ${errorData.message || response.status}</span>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<span class="text-red-600">✗ Error: ${error.message}</span>`;
            }
        });
    </script>
</body>
</html>
