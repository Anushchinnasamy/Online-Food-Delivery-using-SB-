<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test User Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ff6b35',
                        secondary: '#2d3748',
                        accent: '#38b2ac'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <h1 class="text-2xl font-bold text-primary">🍕 FoodDelivery Test</h1>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <!-- User Menu -->
                    <div id="userMenu" class="hidden">
                        <div class="relative">
                            <button id="userMenuBtn" class="flex items-center text-gray-700 hover:text-primary">
                                <i class="fas fa-user-circle text-xl mr-2"></i>
                                <span id="userName">User</span>
                                <i class="fas fa-chevron-down ml-1"></i>
                            </button>
                            <div id="userDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-50">
                                <button id="logoutBtn" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Logout</button>
                            </div>
                        </div>
                    </div>

                    <!-- Auth Buttons -->
                    <div id="authButtons">
                        <button id="loginBtn" class="bg-primary text-white px-4 py-2 rounded text-sm font-medium hover:bg-orange-600">Login</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Instructions -->
        <div class="bg-blue-50 border border-blue-200 rounded-lg p-6 mb-6">
            <h2 class="text-lg font-semibold text-blue-800 mb-2">Test Instructions</h2>
            <ol class="list-decimal list-inside text-blue-700 space-y-1">
                <li>Click the "Login" button above to authenticate</li>
                <li>Watch the console for debug messages</li>
                <li>Restaurants should load automatically after login</li>
                <li>Check the browser's Network tab for API calls</li>
            </ol>
        </div>

        <!-- Status -->
        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="text-lg font-semibold mb-4">Current Status</h2>
            <div id="status" class="space-y-2 text-sm"></div>
        </div>

        <!-- Restaurants Section -->
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-lg font-semibold mb-4">Restaurants</h2>
            
            <!-- Restaurants Grid -->
            <div id="restaurantsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Restaurants will be loaded here -->
            </div>

            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="hidden text-center py-8">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
                <p class="mt-2 text-gray-600">Loading restaurants...</p>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/restaurants.js"></script>
    <script>
        function updateStatus() {
            const statusDiv = document.getElementById('status');
            const isAuth = authManager.isAuthenticated();
            const user = authManager.getCurrentUser();
            const token = localStorage.getItem(STORAGE_KEYS.ACCESS_TOKEN);
            const restaurantCount = restaurantManager.restaurants.length;
            
            statusDiv.innerHTML = `
                <p><strong>🔐 Authenticated:</strong> <span class="${isAuth ? 'text-green-600' : 'text-red-600'}">${isAuth ? 'Yes' : 'No'}</span></p>
                <p><strong>👤 User:</strong> ${user ? `${user.email} (${user.role})` : 'None'}</p>
                <p><strong>🎫 Token:</strong> <span class="${token ? 'text-green-600' : 'text-red-600'}">${token ? 'Present' : 'Missing'}</span></p>
                <p><strong>🏪 Restaurants:</strong> <span class="${restaurantCount > 0 ? 'text-green-600' : 'text-gray-600'}">${restaurantCount} loaded</span></p>
            `;
        }
        
        // Login button handler
        document.getElementById('loginBtn').addEventListener('click', async () => {
            console.log('🔄 Login button clicked');
            try {
                await authManager.login('john.demo@fooddelivery.com', 'password123');
                console.log('✅ Login completed');
            } catch (error) {
                console.error('❌ Login failed:', error);
                alert('Login failed: ' + error.message);
            }
        });
        
        // Listen for auth events
        document.addEventListener('userLoggedIn', (e) => {
            console.log('🎉 userLoggedIn event received:', e.detail);
            updateStatus();
        });
        
        document.addEventListener('userLoggedOut', () => {
            console.log('👋 userLoggedOut event received');
            updateStatus();
        });
        
        // Monitor restaurant loading
        const originalLoadRestaurants = restaurantManager.loadRestaurants;
        restaurantManager.loadRestaurants = async function() {
            console.log('🏪 RestaurantManager.loadRestaurants called');
            updateStatus();
            try {
                await originalLoadRestaurants.call(this);
                console.log(`✅ Restaurants loaded successfully: ${this.restaurants.length}`);
                updateStatus();
            } catch (error) {
                console.error('❌ Restaurant loading failed:', error);
                updateStatus();
                throw error;
            }
        };
        
        // Initialize
        console.log('🚀 Page initialized');
        updateStatus();
        
        // Update status every 2 seconds
        setInterval(updateStatus, 2000);
    </script>
</body>
</html>
