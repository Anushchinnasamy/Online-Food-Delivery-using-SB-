<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Auth Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        button { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .result { margin: 20px 0; padding: 15px; border-radius: 4px; white-space: pre-wrap; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Simple Authentication Test</h1>
    
    <button onclick="testDirectAPI()">Test Direct API Call</button>
    <button onclick="testWithAuthManager()">Test with AuthManager</button>
    
    <div id="result"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function testDirectAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing direct API call...';
            
            const testData = {
                name: 'Direct Test User',
                email: 'directtest' + Math.floor(Math.random() * 10000) + '@example.com',
                phone: '9876543' + String(Math.floor(Math.random() * 1000)).padStart(3, '0'),
                password: 'password123',
                role: 'CUSTOMER'
            };
            
            console.log('Test data:', testData);
            console.log('API URL:', API_CONFIG.BASE_URL + API_CONFIG.ENDPOINTS.REGISTER);
            
            try {
                const response = await fetch(API_CONFIG.BASE_URL + API_CONFIG.ENDPOINTS.REGISTER, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testData)
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);
                
                const responseText = await response.text();
                console.log('Response text:', responseText);
                
                if (response.ok) {
                    const data = JSON.parse(responseText);
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `✅ Direct API Success!\nUser: ${data.user.email}\nPhone: ${data.user.phone}`;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = `❌ Direct API Failed!\nStatus: ${response.status}\nResponse: ${responseText}`;
                }
            } catch (error) {
                console.error('Direct API error:', error);
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ Direct API Error!\n${error.message}`;
            }
        }
        
        async function testWithAuthManager() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing with AuthManager...';
            
            const testData = {
                name: 'AuthManager Test User',
                email: 'authtest' + Math.floor(Math.random() * 10000) + '@example.com',
                phone: '9876543' + String(Math.floor(Math.random() * 1000)).padStart(3, '0'),
                password: 'password123',
                role: 'CUSTOMER'
            };
            
            console.log('AuthManager test data:', testData);
            
            try {
                const result = await authManager.register(testData);
                console.log('AuthManager result:', result);
                
                resultDiv.className = 'result success';
                resultDiv.textContent = `✅ AuthManager Success!\nUser: ${result.user.email}\nPhone: ${result.user.phone}`;
            } catch (error) {
                console.error('AuthManager error:', error);
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ AuthManager Error!\n${error.message}`;
            }
        }
        
        // Check if config is loaded
        console.log('API_CONFIG:', API_CONFIG);
        console.log('authManager:', authManager);
        
        // Test Utils function
        if (typeof Utils !== 'undefined') {
            console.log('Utils loaded:', Utils);
        } else {
            console.error('Utils not loaded!');
        }
    </script>
</body>
</html>
