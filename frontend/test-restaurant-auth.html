<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Restaurant Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Test Restaurant Authentication Flow</h1>
        
        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="text-lg font-semibold mb-4">Step 1: Login</h2>
            <button id="loginBtn" class="bg-blue-500 text-white px-4 py-2 rounded mr-2">Login as Customer</button>
            <button id="logoutBtn" class="bg-red-500 text-white px-4 py-2 rounded">Logout</button>
            <div id="authStatus" class="mt-4 p-4 bg-gray-100 rounded"></div>
        </div>
        
        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="text-lg font-semibold mb-4">Step 2: Test Restaurant API</h2>
            <button id="testApiBtn" class="bg-green-500 text-white px-4 py-2 rounded mb-4">Test Restaurant API</button>
            <div id="apiResult" class="p-4 bg-gray-100 rounded"></div>
        </div>
        
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-lg font-semibold mb-4">Step 3: Test Restaurant Manager</h2>
            <button id="testManagerBtn" class="bg-purple-500 text-white px-4 py-2 rounded mb-4">Test Restaurant Manager</button>
            <div id="restaurantsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-4"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/restaurants.js"></script>
    <script>
        function updateAuthStatus() {
            const authStatusDiv = document.getElementById('authStatus');
            const isAuth = authManager.isAuthenticated();
            const user = authManager.getCurrentUser();
            const token = localStorage.getItem(STORAGE_KEYS.ACCESS_TOKEN);
            
            authStatusDiv.innerHTML = `
                <p><strong>Authenticated:</strong> ${isAuth}</p>
                <p><strong>User:</strong> ${user ? user.email + ' (' + user.role + ')' : 'None'}</p>
                <p><strong>Token exists:</strong> ${token ? 'Yes' : 'No'}</p>
            `;
        }
        
        document.getElementById('loginBtn').addEventListener('click', async () => {
            try {
                const result = await authManager.login('john.demo@fooddelivery.com', 'password123');
                console.log('Login result:', result);
                updateAuthStatus();
                document.getElementById('apiResult').innerHTML = '<p class="text-green-500">Login successful!</p>';
            } catch (error) {
                console.error('Login failed:', error);
                document.getElementById('apiResult').innerHTML = `<p class="text-red-500">Login failed: ${error.message}</p>`;
            }
        });
        
        document.getElementById('logoutBtn').addEventListener('click', () => {
            authManager.logout();
            updateAuthStatus();
            document.getElementById('apiResult').innerHTML = '<p class="text-blue-500">Logged out</p>';
            document.getElementById('restaurantsGrid').innerHTML = '';
        });
        
        document.getElementById('testApiBtn').addEventListener('click', async () => {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.innerHTML = '<p>Testing API...</p>';
            
            try {
                console.log('Making API request to /restaurants');
                const response = await authManager.apiRequest('/restaurants');
                console.log('Response status:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Response data:', data);
                    resultDiv.innerHTML = `
                        <p class="text-green-500"><strong>Success!</strong> Status: ${response.status}</p>
                        <p><strong>Restaurants found:</strong> ${data.length}</p>
                        <pre class="mt-2 text-sm">${JSON.stringify(data.slice(0, 2), null, 2)}</pre>
                    `;
                } else {
                    const errorData = await response.json();
                    resultDiv.innerHTML = `
                        <p class="text-red-500"><strong>Error:</strong> Status ${response.status}</p>
                        <pre class="mt-2 text-sm">${JSON.stringify(errorData, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                console.error('API test failed:', error);
                resultDiv.innerHTML = `<p class="text-red-500">API test failed: ${error.message}</p>`;
            }
        });
        
        document.getElementById('testManagerBtn').addEventListener('click', async () => {
            try {
                console.log('Testing restaurant manager...');
                await restaurantManager.loadRestaurants();
                document.getElementById('apiResult').innerHTML = '<p class="text-green-500">Restaurant manager test completed! Check the grid below.</p>';
            } catch (error) {
                console.error('Restaurant manager test failed:', error);
                document.getElementById('apiResult').innerHTML = `<p class="text-red-500">Restaurant manager test failed: ${error.message}</p>`;
            }
        });
        
        // Listen for auth events
        document.addEventListener('userLoggedIn', (e) => {
            console.log('User logged in event:', e.detail);
            updateAuthStatus();
        });
        
        document.addEventListener('userLoggedOut', () => {
            console.log('User logged out event');
            updateAuthStatus();
        });
        
        // Initialize
        updateAuthStatus();
    </script>
</body>
</html>
