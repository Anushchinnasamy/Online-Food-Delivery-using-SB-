<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FoodDelivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ff6b35',
                        secondary: '#2d3748',
                        accent: '#38b2ac'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full space-y-8 p-8">
        <!-- Header -->
        <div class="text-center">
            <a href="../index.html" class="inline-block">
                <h1 class="text-3xl font-bold text-primary mb-2">🍕 FoodDelivery</h1>
            </a>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Welcome back!</h2>
            <p class="text-gray-600">Sign in to your account to continue</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="mt-8 space-y-6">
            <div class="space-y-4">
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
                        Email Address
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400"></i>
                        </div>
                        <input id="email" name="email" type="email" required
                               class="appearance-none relative block w-full pl-10 pr-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-lg focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm"
                               placeholder="Enter your email">
                    </div>
                    <div id="emailError" class="text-red-500 text-sm mt-1 hidden"></div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
                        Password
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400"></i>
                        </div>
                        <input id="password" name="password" type="password" required
                               class="appearance-none relative block w-full pl-10 pr-10 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-lg focus:outline-none focus:ring-primary focus:border-primary focus:z-10 sm:text-sm"
                               placeholder="Enter your password">
                        <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center">
                            <i class="fas fa-eye text-gray-400 hover:text-gray-600"></i>
                        </button>
                    </div>
                    <div id="passwordError" class="text-red-500 text-sm mt-1 hidden"></div>
                </div>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="rememberMe" name="rememberMe" type="checkbox"
                           class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                    <label for="rememberMe" class="ml-2 block text-sm text-gray-900">
                        Remember me
                    </label>
                </div>
                <div class="text-sm">
                    <a href="#" class="font-medium text-primary hover:text-orange-600">
                        Forgot your password?
                    </a>
                </div>
            </div>

            <!-- Submit Button -->
            <div>
                <button type="submit" id="loginBtn"
                        class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-primary hover:bg-orange-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition duration-300">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-sign-in-alt text-orange-300 group-hover:text-orange-200"></i>
                    </span>
                    <span id="loginBtnText">Sign In</span>
                    <div id="loginSpinner" class="hidden ml-2">
                        <div class="animate-spin rounded-full h-4 w-4 border-b-2 border-white"></div>
                    </div>
                </button>
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg">
                <div class="flex items-center">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span id="errorText"></span>
                </div>
            </div>
        </form>

        <!-- Demo Accounts -->
        <div class="mt-8 p-4 bg-blue-50 border border-blue-200 rounded-lg">
            <h3 class="text-sm font-medium text-blue-900 mb-2">Demo Accounts (Password: password123)</h3>
            <div class="space-y-2 text-sm">
                <div class="flex justify-between items-center">
                    <span class="text-blue-700">Customer:</span>
                    <button class="demo-login text-blue-600 hover:text-blue-800 underline" data-email="john.demo@fooddelivery.com">
                        john.demo@fooddelivery.com
                    </button>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-blue-700">Restaurant:</span>
                    <button class="demo-login text-blue-600 hover:text-blue-800 underline" data-email="restaurant.demo@fooddelivery.com">
                        restaurant.demo@fooddelivery.com
                    </button>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-blue-700">Delivery:</span>
                    <button class="demo-login text-blue-600 hover:text-blue-800 underline" data-email="delivery.demo@fooddelivery.com">
                        delivery.demo@fooddelivery.com
                    </button>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-blue-700">Admin:</span>
                    <button class="demo-login text-blue-600 hover:text-blue-800 underline" data-email="admin.demo@fooddelivery.com">
                        admin.demo@fooddelivery.com
                    </button>
                </div>
            </div>
        </div>

        <!-- Sign Up Link -->
        <div class="text-center">
            <p class="text-sm text-gray-600">
                Don't have an account?
                <a href="register.html" class="font-medium text-primary hover:text-orange-600">
                    Sign up here
                </a>
            </p>
        </div>

        <!-- Partner Links -->
        <div class="text-center pt-4 border-t border-gray-200">
            <p class="text-sm text-gray-600 mb-2">Are you a business partner?</p>
            <div class="space-x-4">
                <a href="restaurant-login.html" class="text-sm text-primary hover:text-orange-600">Restaurant Login</a>
                <a href="delivery-login.html" class="text-sm text-primary hover:text-orange-600">Delivery Partner Login</a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/config.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const togglePassword = document.getElementById('togglePassword');
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');
            const loginSpinner = document.getElementById('loginSpinner');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            // Redirect if already logged in
            if (authManager.isAuthenticated()) {
                authManager.redirectAfterLogin();
                return;
            }

            // Toggle password visibility
            togglePassword.addEventListener('click', () => {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                const icon = togglePassword.querySelector('i');
                icon.classList.toggle('fa-eye');
                icon.classList.toggle('fa-eye-slash');
            });

            // Form validation
            function validateForm() {
                let isValid = true;
                
                // Email validation
                const email = emailInput.value.trim();
                const emailError = document.getElementById('emailError');
                if (!email) {
                    emailError.textContent = 'Email is required';
                    emailError.classList.remove('hidden');
                    isValid = false;
                } else if (!Utils.isValidEmail(email)) {
                    emailError.textContent = 'Please enter a valid email address';
                    emailError.classList.remove('hidden');
                    isValid = false;
                } else {
                    emailError.classList.add('hidden');
                }

                // Password validation
                const password = passwordInput.value;
                const passwordError = document.getElementById('passwordError');
                if (!password) {
                    passwordError.textContent = 'Password is required';
                    passwordError.classList.remove('hidden');
                    isValid = false;
                } else if (password.length < 6) {
                    passwordError.textContent = 'Password must be at least 6 characters';
                    passwordError.classList.remove('hidden');
                    isValid = false;
                } else {
                    passwordError.classList.add('hidden');
                }

                return isValid;
            }

            // Handle form submission
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                if (!validateForm()) {
                    return;
                }

                // Show loading state
                loginBtn.disabled = true;
                loginBtnText.textContent = 'Signing In...';
                loginSpinner.classList.remove('hidden');
                errorMessage.classList.add('hidden');

                try {
                    const email = emailInput.value.trim();
                    const password = passwordInput.value;

                    await authManager.login(email, password);
                } catch (error) {
                    // Show error message
                    errorText.textContent = error.message;
                    errorMessage.classList.remove('hidden');
                } finally {
                    // Reset loading state
                    loginBtn.disabled = false;
                    loginBtnText.textContent = 'Sign In';
                    loginSpinner.classList.add('hidden');
                }
            });

            // Demo login buttons
            document.querySelectorAll('.demo-login').forEach(btn => {
                btn.addEventListener('click', () => {
                    const email = btn.dataset.email;
                    emailInput.value = email;
                    passwordInput.value = 'password123';
                });
            });

            // Real-time validation
            emailInput.addEventListener('blur', validateForm);
            passwordInput.addEventListener('blur', validateForm);
        });
    </script>
</body>
</html>
