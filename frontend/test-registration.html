<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 300px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #ff6b35; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .result { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <h1>Registration Test</h1>
    
    <form id="testForm">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" value="Test User" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" value="" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone (10 digits, starting with 6-9):</label>
            <input type="tel" id="phone" value="9876543210" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" value="password123" required>
        </div>
        
        <div class="form-group">
            <label for="role">Role:</label>
            <select id="role" required>
                <option value="">Select role</option>
                <option value="CUSTOMER" selected>Customer</option>
                <option value="RESTAURANT_ADMIN">Restaurant Admin</option>
                <option value="DELIVERY_PARTNER">Delivery Partner</option>
            </select>
        </div>
        
        <button type="submit">Register</button>
        <button type="button" onclick="generateRandomData()">Generate Random Data</button>
    </form>
    
    <div id="result"></div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Generate random email on page load
        document.getElementById('email').value = 'testuser' + Math.floor(Math.random() * 10000) + '@example.com';
        
        function generateRandomData() {
            const randomNum = Math.floor(Math.random() * 10000);
            document.getElementById('name').value = 'Test User ' + randomNum;
            document.getElementById('email').value = 'testuser' + randomNum + '@example.com';
            
            // Generate valid 10-digit phone starting with 9
            const phoneNum = '9876' + String(Math.floor(Math.random() * 1000000)).padStart(6, '0');
            document.getElementById('phone').value = phoneNum;
        }
        
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<div class="info">Testing registration...</div>';
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };
            
            console.log('Form data:', formData);
            
            // Validate phone number using Utils function
            if (!Utils.isValidPhone(formData.phone)) {
                resultDiv.innerHTML = '<div class="error">Invalid phone number format. Must be 10 digits starting with 6-9.</div>';
                return;
            }
            
            try {
                console.log('Calling authManager.register...');
                const result = await authManager.register(formData);
                console.log('Registration result:', result);
                
                resultDiv.innerHTML = `
                    <div class="success">
                        <h3>Registration Successful!</h3>
                        <p><strong>User:</strong> ${result.user.email}</p>
                        <p><strong>Role:</strong> ${result.user.role}</p>
                        <p><strong>Phone:</strong> ${result.user.phone}</p>
                        <p><strong>Token:</strong> ${result.access_token.substring(0, 50)}...</p>
                    </div>
                `;
            } catch (error) {
                console.error('Registration error:', error);
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>Registration Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
