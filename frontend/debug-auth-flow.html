<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Auth Flow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Debug Authentication Flow</h1>
        
        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="text-lg font-semibold mb-4">Step-by-Step Debug</h2>
            <div class="space-y-2">
                <button id="step1" class="bg-blue-500 text-white px-4 py-2 rounded mr-2">1. Check Initial State</button>
                <button id="step2" class="bg-green-500 text-white px-4 py-2 rounded mr-2">2. Login</button>
                <button id="step3" class="bg-purple-500 text-white px-4 py-2 rounded mr-2">3. Test Auth Header</button>
                <button id="step4" class="bg-orange-500 text-white px-4 py-2 rounded mr-2">4. Test API Request</button>
                <button id="step5" class="bg-red-500 text-white px-4 py-2 rounded">5. Load Restaurants</button>
            </div>
        </div>
        
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-lg font-semibold mb-4">Debug Output</h2>
            <div id="debugOutput" class="bg-gray-100 p-4 rounded font-mono text-sm whitespace-pre-wrap"></div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/restaurants.js"></script>
    <script>
        const debugOutput = document.getElementById('debugOutput');
        
        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            debugOutput.textContent += `[${timestamp}] ${message}\n`;
            debugOutput.scrollTop = debugOutput.scrollHeight;
            console.log(message);
        }
        
        document.getElementById('step1').addEventListener('click', () => {
            log('=== STEP 1: Check Initial State ===');
            log(`Authenticated: ${authManager.isAuthenticated()}`);
            log(`Current User: ${JSON.stringify(authManager.getCurrentUser())}`);
            log(`Access Token: ${localStorage.getItem(STORAGE_KEYS.ACCESS_TOKEN) ? 'Present' : 'Missing'}`);
            log(`Refresh Token: ${localStorage.getItem(STORAGE_KEYS.REFRESH_TOKEN) ? 'Present' : 'Missing'}`);
            log(`User Data: ${localStorage.getItem(STORAGE_KEYS.USER_DATA) || 'Missing'}`);
        });
        
        document.getElementById('step2').addEventListener('click', async () => {
            log('=== STEP 2: Login ===');
            try {
                log('Attempting login...');
                const result = await authManager.login('john.demo@fooddelivery.com', 'password123');
                log(`Login successful: ${JSON.stringify(result.user)}`);
                log(`Access Token: ${result.access_token ? 'Received' : 'Missing'}`);
                log(`Refresh Token: ${result.refresh_token ? 'Received' : 'Missing'}`);
            } catch (error) {
                log(`Login failed: ${error.message}`);
            }
        });
        
        document.getElementById('step3').addEventListener('click', () => {
            log('=== STEP 3: Test Auth Header ===');
            const authHeader = authManager.getAuthHeader();
            log(`Auth Header: ${JSON.stringify(authHeader)}`);
            
            const token = localStorage.getItem(STORAGE_KEYS.ACCESS_TOKEN);
            if (token) {
                log(`Token (first 50 chars): ${token.substring(0, 50)}...`);
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    log(`Token payload: ${JSON.stringify(payload)}`);
                    log(`Token expires: ${new Date(payload.exp * 1000).toLocaleString()}`);
                } catch (e) {
                    log(`Token decode error: ${e.message}`);
                }
            }
        });
        
        document.getElementById('step4').addEventListener('click', async () => {
            log('=== STEP 4: Test API Request ===');
            try {
                log('Making test API request to /restaurants...');
                const response = await authManager.apiRequest('/restaurants');
                log(`Response status: ${response.status}`);
                log(`Response ok: ${response.ok}`);
                
                if (response.ok) {
                    const data = await response.json();
                    log(`Response data type: ${Array.isArray(data) ? 'Array' : typeof data}`);
                    if (data.content) {
                        log(`Paginated response with ${data.content.length} restaurants`);
                    } else if (Array.isArray(data)) {
                        log(`Direct array with ${data.length} restaurants`);
                    } else {
                        log(`Unexpected response format: ${JSON.stringify(data).substring(0, 200)}...`);
                    }
                } else {
                    const errorText = await response.text();
                    log(`Error response: ${errorText}`);
                }
            } catch (error) {
                log(`API request failed: ${error.message}`);
            }
        });
        
        document.getElementById('step5').addEventListener('click', async () => {
            log('=== STEP 5: Load Restaurants ===');
            try {
                log('Calling restaurantManager.loadRestaurants()...');
                await restaurantManager.loadRestaurants();
                log(`Restaurants loaded: ${restaurantManager.restaurants.length}`);
            } catch (error) {
                log(`Load restaurants failed: ${error.message}`);
            }
        });
        
        // Initial state check
        setTimeout(() => {
            document.getElementById('step1').click();
        }, 500);
    </script>
</body>
</html>
