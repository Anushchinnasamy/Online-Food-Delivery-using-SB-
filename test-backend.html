<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Test - Food Delivery Platform</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
        button { padding: 10px 20px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🍕 Food Delivery Platform - Backend Test</h1>
    
    <div class="info">
        <strong>Backend URL:</strong> http://localhost:8081/api<br>
        <strong>Frontend URL:</strong> http://localhost:3000
    </div>

    <h2>API Tests</h2>
    
    <button onclick="testRestaurants()">Test Restaurants Endpoint</button>
    <button onclick="testLogin()">Test Login</button>
    <button onclick="testRegister()">Test Register</button>
    <button onclick="runAllTests()">Run All Tests</button>
    
    <div id="results"></div>

    <script>
        const API_BASE = 'http://localhost:8081/api';
        
        function addResult(message, type = 'info') {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = message;
            results.appendChild(div);
        }

        async function testRestaurants() {
            addResult('Testing restaurants endpoint...', 'info');
            try {
                const response = await fetch(`${API_BASE}/restaurants`);
                if (response.ok) {
                    const data = await response.json();
                    addResult(`✅ Restaurants endpoint working! Found ${data.length} restaurants`, 'success');
                    addResult(`<pre>${JSON.stringify(data, null, 2)}</pre>`, 'info');
                } else {
                    addResult(`⚠️ Restaurants endpoint returned ${response.status}: ${response.statusText}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Error testing restaurants: ${error.message}`, 'error');
            }
        }

        async function testLogin() {
            addResult('Testing login endpoint...', 'info');
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'admin@fooddelivery.com',
                        password: 'password123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    addResult('✅ Login successful!', 'success');
                    addResult(`Token: ${data.token.substring(0, 50)}...`, 'info');
                    addResult(`User: ${data.user.name} (${data.user.role})`, 'info');
                } else {
                    addResult(`⚠️ Login failed: ${data.error || data.message}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Error testing login: ${error.message}`, 'error');
            }
        }

        async function testRegister() {
            addResult('Testing register endpoint...', 'info');
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: 'Test User',
                        email: `test${Date.now()}@example.com`,
                        phone: '9876543219',
                        password: 'password123',
                        role: 'CUSTOMER',
                        city: 'Bangalore'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    addResult('✅ Registration successful!', 'success');
                    addResult(`User: ${data.user.name} (${data.user.email})`, 'info');
                } else {
                    addResult(`⚠️ Registration failed: ${data.error || data.message}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Error testing registration: ${error.message}`, 'error');
            }
        }

        async function runAllTests() {
            document.getElementById('results').innerHTML = '';
            addResult('🚀 Running all backend tests...', 'info');
            
            await testRestaurants();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testLogin();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            await testRegister();
            
            addResult('✅ All tests completed!', 'success');
        }

        // Auto-run tests on page load
        window.onload = () => {
            addResult('Backend test page loaded. Click buttons to test endpoints.', 'info');
        };
    </script>
</body>
</html>
