server:
  port: 8082

spring:
  application:
    name: restaurant-service
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5433/restaurant_service_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      
  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    defer-datasource-initialization: true
    
  # SQL Initialization
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

# Eureka Configuration (Disabled for testing)
eureka:
  client:
    enabled: false

# Management Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    com.fooddelivery.restaurant: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    org.springframework.cloud: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/restaurant-service.log

# Custom Application Properties
app:
  restaurant:
    default-delivery-radius-km: 10.0
    max-delivery-radius-km: 50.0
    rating-precision: 1 # decimal places for rating
    default-page-size: 20
    max-page-size: 100