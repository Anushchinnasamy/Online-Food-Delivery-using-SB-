spring:
  application:
    name: notification-service-test
  
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    defer-datasource-initialization: true
    
  sql:
    init:
      mode: always
      data-locations: classpath:test-data.sql

  h2:
    console:
      enabled: true

  task:
    execution:
      pool:
        core-size: 2
        max-size: 5
        queue-capacity: 10

# Disable Eureka for tests
eureka:
  client:
    enabled: false

# Test logging
logging:
  level:
    com.fooddelivery.notification: DEBUG
    org.springframework.test: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Test-specific properties
notification:
  retry:
    max-attempts: 2
    delay-minutes:
      first: 1
      second: 2
      third: 5
  processing:
    batch-size: 10
    delay-threshold-minutes:
      realtime: 1
      email: 5
  sender:
    email:
      enabled: true
      timeout-seconds: 5
    sms:
      enabled: true
      timeout-seconds: 3
    push:
      enabled: true
      timeout-seconds: 2