version: '3.8'

services:
  # PostgreSQL Database for Auth Service
  auth-db:
    image: postgres:15-alpine
    container_name: auth-service-db
    environment:
      POSTGRES_DB: auth_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - food-delivery-network

  # PostgreSQL Database for User Service
  user-db:
    image: postgres:15-alpine
    container_name: user-service-db
    environment:
      POSTGRES_DB: user_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - food-delivery-network

  # PostgreSQL Database for Restaurant Service
  restaurant-db:
    image: postgres:15-alpine
    container_name: restaurant-service-db
    environment:
      POSTGRES_DB: restaurant_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    volumes:
      - restaurant_db_data:/var/lib/postgresql/data
    networks:
      - food-delivery-network

  # PostgreSQL Database for Order Service
  order-db:
    image: postgres:15-alpine
    container_name: order-service-db
    environment:
      POSTGRES_DB: order_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5436:5432"
    volumes:
      - order_db_data:/var/lib/postgresql/data
    networks:
      - food-delivery-network

  # PostgreSQL Database for Payment Service
  payment-db:
    image: postgres:15-alpine
    container_name: payment-service-db
    environment:
      POSTGRES_DB: payment_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5437:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    networks:
      - food-delivery-network

  # PostgreSQL Database for Delivery Service
  delivery-db:
    image: postgres:15-alpine
    container_name: delivery-service-db
    environment:
      POSTGRES_DB: delivery_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5438:5432"
    volumes:
      - delivery_db_data:/var/lib/postgresql/data
    networks:
      - food-delivery-network

  # Redis for Caching and Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: food-delivery-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - food-delivery-network

  # RabbitMQ for Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: food-delivery-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - food-delivery-network

  # Elasticsearch for Logging
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: food-delivery-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - food-delivery-network

  # Kibana for Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: food-delivery-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - food-delivery-network

  # Prometheus for Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: food-delivery-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - food-delivery-network

  # Grafana for Metrics Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: food-delivery-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - food-delivery-network

volumes:
  auth_db_data:
  user_db_data:
  restaurant_db_data:
  order_db_data:
  payment_db_data:
  delivery_db_data:
  redis_data:
  rabbitmq_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:

networks:
  food-delivery-network:
    driver: bridge