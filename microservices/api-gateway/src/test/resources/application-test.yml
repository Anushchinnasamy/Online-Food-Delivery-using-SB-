server:
  port: 0  # Random port for testing

spring:
  application:
    name: api-gateway-test
  
  # Disable Redis for testing
  redis:
    host: localhost
    port: 6379
    timeout: 1000ms
  
  cloud:
    gateway:
      routes:
        # Minimal routes for testing
        - id: test-route
          uri: http://httpbin.org
          predicates:
            - Path=/test/**

# JWT Configuration for testing
jwt:
  secret: testSecretKey123456789012345678901234567890123456789012345678901234567890

# Disable circuit breaker for testing
resilience4j:
  circuitbreaker:
    instances:
      test-cb:
        register-health-indicator: false

# Logging for tests
logging:
  level:
    com.fooddelivery.gateway: INFO
    org.springframework.cloud.gateway: WARN