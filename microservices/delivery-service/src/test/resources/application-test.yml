spring:
  application:
    name: delivery-service-test
  
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
    
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    defer-datasource-initialization: true
    
  sql:
    init:
      mode: always
      data-locations: classpath:test-data.sql

  h2:
    console:
      enabled: true

# Disable Eureka for tests
eureka:
  client:
    enabled: false

# Disable Feign for tests
feign:
  hystrix:
    enabled: false

# Test logging
logging:
  level:
    com.fooddelivery.delivery: DEBUG
    org.springframework.test: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Test-specific properties
delivery:
  assignment:
    max-rejection-count: 2
    search-radius-km: 5.0
    partner-timeout-minutes: 5
  tracking:
    location-update-interval-seconds: 10
    delivery-timeout-hours: 1